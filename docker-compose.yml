version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: insurance_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/insurance_copilot"
      DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@postgres:5432/insurance_copilot"
    volumes:
      - uploads:/app/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
