services:
  - type: web
    name: insurance-copilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: CLERK_API_KEY
        sync: false
      - key: CLERK_JWT_PUB_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://insurance-copilot.onrender.com"]'
      - key: UPLOAD_DIR
        value: uploads
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: insurance-copilot-db
    plan: standard
    databaseName: insurance_copilot
    user: postgres
    region: oregon
    version: "16"
    extensions:
      - vector
